  # ====================>>>>> Phase 1: Baseline Comparison <<<<<====================
  - name: "S1a_TEST_Denoising_Baseline"
    description: "Standard U-Net baseline in denoising."
    template:
      pattern: "supervised_pattern_standard"
      metrics:
        restoration:
          id: "restoration_metrics_standard"
          params:
            data_range: 1.0  # Assumes normalized [0,1] data
            include_lpips: false # Recommended for SOTA comparison (S7a)
        error:
          id: "mae_standard"
          params: {}
      data:
        main:
          id: "denoising_bsd_standard"
          type: "denoising_bsd_standard"
          source: "BSD400/BSD68"
          params:
            color: "grayscale"
            sigma: 25
            crop_size: 128
            subset_fraction: 1.0
          splits: ["train", "val", "test"]
      optimizer:
        main:
          id: "adam_standard" 
          type: "adam_standard"
          params: 
            adam_lr: 1e-3
            adam_betas: [0.9, 0.999]
      loss: 
        main: 
          id: "l1_standard"
          type: "l1_standard"
          params: 
            reduction: "mean"
      phases:
        train:
          epochs: 200
          batch_size: 16
        val:
          batch_size: 1
        test:
          batch_size: 1
    grid:
      models.main: [
        {
          id: dn_cnn,
          label: "dn_cnn",
          type: "dn_cnn",
          params: {
            in_channels: 1,
            out_channels: 1,
            depth: 17,
            n_channels: 64,
            bias: True,
            weights: "external/dncnn/pretraind_ckpt/grayscale_sigma_25.pth",
          }
        },
      ]

